name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kavach
          POSTGRES_PASSWORD: kavach
          POSTGRES_DB: kavach_saathi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kavach -d kavach_saathi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://kavach:kavach@localhost:5432/kavach_saathi
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install backend + dev dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Apply every database migration
        run: alembic upgrade head

      - name: Verify migration graph has one current head
        run: test "$(alembic heads | wc -l)" -eq 1

      # No mypy/pyright in this project (plain Python without static typing on top of
      # pydantic's runtime validation) -- ruff is the only static check that applies.

      - name: Create schema and seed deterministic demo data
        run: python scripts/generate_seed_data.py

      - name: Run pytest
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
