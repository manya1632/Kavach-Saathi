name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kavach
          POSTGRES_PASSWORD: kavach
          POSTGRES_DB: kavach_saathi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kavach -d kavach_saathi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://kavach:kavach@localhost:5432/kavach_saathi
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install backend + dev dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Apply every database migration
        run: alembic upgrade head

      - name: Verify migration graph has one current head
        run: test "$(alembic heads | wc -l)" -eq 1

      # No mypy/pyright in this project (plain Python without static typing on top of
      # pydantic's runtime validation) -- ruff is the only static check that applies.

      - name: Create schema and seed deterministic demo data
        run: python scripts/generate_seed_data.py

      - name: Run pytest
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kavach
          POSTGRES_PASSWORD: kavach
          POSTGRES_DB: kavach_saathi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kavach -d kavach_saathi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://kavach:kavach@localhost:5432/kavach_saathi
      REDIS_URL: redis://localhost:6379/0
      FRONTEND_ORIGIN: http://localhost:3000
      AGENT_API_ORIGIN: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install .

      - name: Create schema and seed deterministic demo data
        run: python scripts/generate_seed_data.py

      - name: Start backend
        run: |
          nohup python -m uvicorn kavach_saathi.app:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/health && exit 0; sleep 2; done
          echo "Backend never became healthy"; cat backend.log; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build and start frontend
        working-directory: web
        run: |
          npm run build
          nohup npm run start -- --hostname 0.0.0.0 --port 3000 > frontend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000 && exit 0; sleep 2; done
          echo "Frontend never became healthy"; cat frontend.log; exit 1

      - name: Run Playwright E2E suite
        working-directory: web
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
